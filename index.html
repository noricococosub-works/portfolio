<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<!-- ページの説明文（検索結果のスニペットに使われる） -->
<meta name="description" content="ページの説明文 120〜160文字程度">
	
<!-- 検索エンジンへの指示（基本はindexさせる）
<meta name="robots" content="index, follow"> -->
	
<!-- ステージング・管理画面など非公開ページ -->
<meta name="robots" content="noindex, nofollow">


<!-- OGP：SNSシェア時のカード表示 -->
<meta property="og:title" content="ページタイトル">
<meta property="og:description" content="説明文">
<meta property="og:image" content="https://placehold.jp/1200x630.png"><!-- 1200×630px推奨 -->
<meta property="og:image" content="https://example.com/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://example.com/page">
<meta property="og:type" content="website"> <!-- 記事ならarticle -->
<meta property="og:site_name" content="サイト名">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@アカウント名">
	
<!-- 記事ページなら記事タイトルをog:titleに、アイキャッチをog:imageに -->
<meta property="og:title" content="記事タイトル">
<meta property="og:image" content="https://example.com/articles/123/ogp.png">	
<title>accessibility_dental-clinic</title>
	
</head>

<body>
	<header>
		<div class="container"><!-- ← ヘッダーの中にcontainerを入れる -->
			<nav>...</nav>
		</div>
	</header>

	<main>
		<div class="container">
			
			
			
			
		</div>
	</main>

	<footer>
		<div class="container">
			
			
			
		</div>
	</footer>
</body>
</html>
